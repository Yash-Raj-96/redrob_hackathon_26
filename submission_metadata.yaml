# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  "A lightweight, CPU-optimized ranking engine that evaluates 100,000 candidates for the Senior AI Engineer role through a 7-step pipeline."
  
  "Step 1: Load and flatten JSONL candidate profiles, normalize skills, aggregate career text, and extract platform signals.
  Step 2: Apply hard filtering to remove candidates with <2 years experience, no technical AI/ML signals, or clearly unrelated professions.
  Step 3: Compute three component scores: Skill Match (Tier A/B/C with Retrieval, Ranking, LLM bonuses), Career Match (title relevance, company quality, experience, seniority), and Behavioral Score (availability, responsiveness, activity, verification).
  Step 4: Combine scores using weighted formula: Skill (55%) + Career (30%) + Behavior (15%) = Initial Score.
  Step 5: Apply deterministic reranking adjustments for Open to Work, Notice Period, Response Rate, Activity, GitHub, and Verification.
  Step 6: Select Top 100 candidates.
  Step 7: Export CSV with candidate_id, rank, and score."
  
  "Runtime: ~10 seconds on CPU. No external API calls. Fully reproducible."

